<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <title>axi-factorio rc.7 visual review</title>
  <style>
    body{margin:0;padding:28px;background:#f5f6f5;color:#18201b;font:14px/1.5 Inter,ui-sans-serif,sans-serif}
    main{max-width:1280px;margin:auto}h1{margin:0 0 6px}p{color:#66706a}.shot{margin:22px 0;padding:14px;background:#fff;border:1px solid #dce2de}
    img{display:block;width:100%;height:auto}.pass{color:#28754d;font-weight:700}
  </style>
</head>
<body><main>
  <h1>axi-factorio rc.7 viewer semantics</h1>
  <p class="pass">Independent review: passed</p>
  <p>Pipeline position is neutral. Imported work uses a dashed checked diamond,
  human attention uses orange with explicit text, and red is reserved for
  failure or broken execution.</p>
  <section class="shot"><h2>State plan</h2><img src="../plan.png" alt="All rc.7 viewer state variants"></section>
  <section class="shot"><h2>Live trial blob</h2><img src="../viewer.png" alt="Imported blob awaiting review in the rc.7 Viewer"></section>
